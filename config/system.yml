# 系统配置

# 路径配置
paths:
  data_dir: "data"
  raw_data: "data/raw"
  graph_data: "data/graph"
  db_data: "data/db"
  static_data: "data/static"
  images_dir: "data/static/images"
  maps_dir: "data/static/maps"
  diaries_dir: "data/static/diaries"

# 默认参数
defaults:
  language: "zh-CN"
  theme: "light"
  map_zoom: 15
 推荐数量: 10
 日记分页大小: 20

# 规则配置
rules:
  max_diary_size: 10485760  # 10MB
  max_image_size: 5242880   # 5MB
  max_images_per_diary: 10
  min_rating: 1
  max_rating: 5
