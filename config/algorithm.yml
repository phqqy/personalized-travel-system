# 算法参数配置

# TopN 配置
topn:
  default: 10
  max: 50
  min: 1

# 压缩配置
compression:
  enabled: true
  level: 6  # 压缩级别（1-9）
  min_size: 1024  # 最小压缩大小（字节）

# 检索策略
search:
  default_strategy: "fuzzy"
  strategies:
    exact: "精确匹配"
    fuzzy: "模糊匹配"
    prefix: "前缀匹配"
    suffix: "后缀匹配"

# 路径规划配置
path:
  default_strategy: "shortest"
  strategies:
    shortest: "最短距离"
    fastest: "最快时间"
    least_congestion: "最少拥挤"
  timeout: 5.0  # 路径计算超时时间（秒）
  max_nodes: 10000  # 最大节点数

# 排序配置
sort:
  default_strategy: "hot"
  strategies:
    hot: "热度排序"
    rating: "评分排序"
    distance: "距离排序"
    time: "时间排序"
