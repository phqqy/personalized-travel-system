# 地图配置

# 道路配置
roads:
  default_speed: 5  # 默认步行速度（米/秒）
  speed_limits:
    walk: 5
    bike: 10
    car: 20
  default_congestion: 1.0  # 默认拥挤度（1.0表示正常）
  max_congestion: 3.0  # 最大拥挤度

# 交通工具配置
transport:
  available: ["walk", "bike", "car"]
  default: "walk"
  walk:
    speed: 5
    cost_per_unit: 1.0
  bike:
    speed: 10
    cost_per_unit: 0.8
  car:
    speed: 20
    cost_per_unit: 1.5

# 室内导航配置
indoor:
  enabled: true
  default_floor: 1
  max_floor: 10
  floor_height: 3.0  # 每层高度（米）

# 地图可视化配置
visualization:
  node_size: 20
  node_color: "#3498db"
  edge_color: "#95a5a6"
  path_color: "#e74c3c"
  background_color: "#ecf0f1"
