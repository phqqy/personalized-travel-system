<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日记管理 - 个性化旅游系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
</head>

<body class="diary-page">
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="/" class="logo">
                <i class="fas fa-map-marked-alt"></i> 个性化旅游系统
            </a>
            <ul class="nav-links">
                <li><a href="/" class="home-link"><i class="fas fa-home"></i> 首页</a></li>
                <li><a href="/recommend"><i class="fas fa-star"></i> 旅游推荐</a></li>
                <li><a href="/diary"><i class="fas fa-book"></i> 日记管理</a></li>
                <li id="user-links">
                    <a href="/login"><i class="fas fa-sign-in-alt"></i> 登录</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="page-header">
        <div class="container">
            <h1>日记管理</h1>
            <p>记录您的旅游经历</p>
        </div>
    </section>

    <!-- 内容区 -->
    <section class="content">
        <div class="container">
            <div class="diary-container">
                <!-- 日记表单 -->
                <div class="diary-form">
                    <h2>创建/编辑日记</h2>
                    <input type="hidden" id="diary-id">
                    <div class="form-group">
                        <label>标题:</label>
                        <input type="text" id="diary-title" placeholder="请输入日记标题">
                    </div>
                    <div class="form-group">
                        <label>内容:</label>
                        <textarea id="diary-content" placeholder="请输入日记内容"></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="saveDiary()"
                        style="width: 100%; padding: 12px; border: none; border-radius: 4px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.3s; background-color: #3498db; color: white;">保存日记</button>
                    <button class="btn btn-secondary" onclick="clearForm()"
                        style="width: 100%; margin-top: 10px; padding: 12px; border: 1px solid #3498db; border-radius: 4px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.3s; background-color: white; color: #3498db;">清空</button>
                </div>

                <!-- 日记列表 -->
                <div class="diary-list">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2>我的日记</h2>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-secondary" onclick="exportDiary()"><i class="fas fa-download"></i>
                                导出日记</button>
                            <input type="file" id="import-file" style="display: none;" accept=".json">
                            <button class="btn btn-primary" onclick="document.getElementById('import-file').click()"><i
                                    class="fas fa-upload"></i> 导入日记</button>
                        </div>
                    </div>
                    <div id="loading" class="loading" style="display: none;">
                        <i class="fas fa-spinner"></i>
                        <p>加载中...</p>
                    </div>
                    <div id="diary-items"></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        let currentDiaryId = null;

        // 页面加载时获取日记列表和登录状态
        window.onload = function () {
            checkLoginStatus();
            fetchDiaries();
        };

        // 检查用户登录状态
        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/user/status');
                const data = await response.json();
                const userLinks = document.getElementById('user-links');

                if (data.logged_in) {
                    userLinks.innerHTML = `
                        <span style="margin-right: 15px; color: #3498db; font-weight: 500; display: inline-block; vertical-align: middle;">欢迎，${data.user_name}</span>
                        <a href="/logout" style="display: inline-block; vertical-align: middle;"><i class="fas fa-sign-out-alt"></i> 退出</a>
                    `;
                } else {
                    userLinks.innerHTML = `
                        <a href="/login" style="display: inline-block; vertical-align: middle;"><i class="fas fa-sign-in-alt"></i> 登录</a>
                        <a href="/register" style="margin-left: 10px; display: inline-block; vertical-align: middle;"><i class="fas fa-user-plus"></i> 注册</a>
                    `;
                }
            } catch (error) {
                console.error('检查登录状态失败:', error);
            }
        }

        async function fetchDiaries() {
            const loading = document.getElementById('loading');
            const items = document.getElementById('diary-items');

            loading.style.display = 'block';

            try {
                const response = await fetch('/api/diary');
                const diaries = await response.json();

                loading.style.display = 'none';

                if (diaries.length > 0) {
                    items.innerHTML = diaries.map(diary => `
                        <div class="diary-item" data-id="${diary.id}">
                            <div class="diary-header">
                                <h3>${diary.title}</h3>
                                <div class="diary-actions">
                                    <button class="btn btn-secondary" onclick="editDiary(${diary.id})">编辑</button>
                                    <button class="btn btn-danger" onclick="deleteDiary(${diary.id})">删除</button>
                                </div>
                            </div>
                            <div class="diary-meta">
                                <i class="fas fa-clock"></i> ${diary.created_at || new Date().toLocaleString()}
                            </div>
                            <div class="diary-content">
                                ${diary.content.substring(0, 100)}${diary.content.length > 100 ? '...' : ''}
                            </div>
                        </div>
                    `).join('');
                } else {
                    items.innerHTML = '<p style="text-align: center; color: #7f8c8d; padding: 50px;">暂无日记，开始创建吧！</p>';
                }
            } catch (error) {
                console.error('获取日记列表失败:', error);
                loading.style.display = 'none';
                items.innerHTML = '<p style="text-align: center; color: #e74c3c; padding: 50px;">获取日记失败，请重试</p>';
            }
        }

        async function saveDiary() {
            const title = document.getElementById('diary-title').value;
            const content = document.getElementById('diary-content').value;

            if (!title || !content) {
                alert('请填写标题和内容');
                return;
            }

            try {
                if (currentDiaryId) {
                    // 更新日记
                    await fetch('/api/diary', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            id: currentDiaryId,
                            title,
                            content
                        })
                    });
                } else {
                    // 创建日记
                    await fetch('/api/diary', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            title,
                            content
                        })
                    });
                }

                clearForm();
                fetchDiaries();
            } catch (error) {
                console.error('保存日记失败:', error);
                alert('保存日记失败，请重试');
            }
        }

        function editDiary(id) {
            const diaryItem = document.querySelector(`.diary-item[data-id="${id}"]`);
            if (diaryItem) {
                const title = diaryItem.querySelector('h3').textContent;
                const content = diaryItem.querySelector('.diary-content').textContent.replace('...', '');

                document.getElementById('diary-id').value = id;
                document.getElementById('diary-title').value = title;
                document.getElementById('diary-content').value = content;

                currentDiaryId = id;
            }
        }

        async function deleteDiary(id) {
            if (confirm('确定要删除这篇日记吗？')) {
                try {
                    await fetch(`/api/diary?id=${id}`, {
                        method: 'DELETE'
                    });
                    fetchDiaries();
                } catch (error) {
                    console.error('删除日记失败:', error);
                    alert('删除日记失败，请重试');
                }
            }
        }

        function clearForm() {
            document.getElementById('diary-id').value = '';
            document.getElementById('diary-title').value = '';
            document.getElementById('diary-content').value = '';
            currentDiaryId = null;
        }

        // 导出日记
        async function exportDiary() {
            try {
                const response = await fetch('/api/diary/export');
                const data = await response.json();

                // 创建JSON文件并下载
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `diary_export_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (error) {
                console.error('导出日记失败:', error);
                alert('导出日记失败，请重试');
            }
        }

        // 导入日记
        document.getElementById('import-file').addEventListener('change', async function (e) {
            const file = e.target.files[0];
            if (!file) return;

            try {
                const reader = new FileReader();
                reader.onload = async function (event) {
                    try {
                        const data = JSON.parse(event.target.result);
                        const response = await fetch('/api/diary/import', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(data)
                        });
                        const result = await response.json();

                        if (result.success) {
                            alert(`成功导入 ${result.imported} 篇日记`);
                            fetchDiaries();
                        } else {
                            alert('导入失败: ' + (result.error || '未知错误'));
                        }
                    } catch (error) {
                        console.error('解析JSON文件失败:', error);
                        alert('请选择有效的JSON文件');
                    }
                };
                reader.readAsText(file);
            } catch (error) {
                console.error('导入日记失败:', error);
                alert('导入日记失败，请重试');
            }
        });
    </script>
</body>

</html>
