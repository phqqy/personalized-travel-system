<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 个性化旅游系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
</head>

<body>
    <section class="login-section">
        <div class="container">
            <div class="login-container">
                <div class="login-header">
                    <h1>用户登录</h1>
                    <p>登录后查看和管理您的旅游日志</p>
                </div>

                <!-- 测试账号信息 -->
                <div class="test-account-info"
                    style="background-color: #e8f4f8; border-left: 4px solid #3498db; padding: 15px; margin-bottom: 20px; border-radius: 4px;">
                    <p style="margin: 0; color: #2c3e50; font-size: 14px;">
                        <i class="fas fa-info-circle" style="color: #3498db; margin-right: 5px;"></i>
                        <strong>测试账号：</strong>用户名: <code
                            style="background: #fff; padding: 2px 6px; border-radius: 3px;">test</code> 密码: <code
                            style="background: #fff; padding: 2px 6px; border-radius: 3px;">123456</code>
                    </p>
                </div>

                {% if error %}
                <div class="error-message">{{ error }}</div>
                {% endif %}

                {% if success %}
                <div class="success-message">{{ success }}</div>
                {% endif %}

                <form action="/login" method="POST">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; padding: 12px; border: none; border-radius: 4px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.3s; background-color: #3498db; color: white;">登录</button>
                </form>

                <div class="form-footer">
                    <p>还没有账号？ <a href="/register">立即注册</a></p>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
