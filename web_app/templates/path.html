<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路线规划 - 个性化旅游系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
</head>

<body class="path-page">
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="/" class="logo">
                <i class="fas fa-map-marked-alt"></i> 个性化旅游系统
            </a>
            <ul class="nav-links">
                <li><a href="/recommend"><i class="fas fa-star"></i> 旅游推荐</a></li>
                <li><a href="/path"><i class="fas fa-route"></i> 路线规划</a></li>
                <li><a href="/query"><i class="fas fa-search"></i> 场所查询</a></li>
                <li><a href="/diary"><i class="fas fa-book"></i> 日记管理</a></li>
                <li><a href="/map"><i class="fas fa-map"></i> 地图展示</a></li>
                <li id="user-links" class="user-auth-links">
                    <a href="/login"><i class="fas fa-sign-in-alt"></i> 登录</a>
                    <a href="/register"><i class="fas fa-user-plus"></i> 注册</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="page-header">
        <div class="container">
            <h1>路线规划</h1>
            <p>支持多种策略的路线规划，包括最短距离、最快时间和最少拥挤</p>
        </div>
    </section>

    <!-- 内容区 -->
    <section class="content">
        <div class="container">
            <!-- 路线规划表单 -->
            <div class="path-form">
                <h2>规划路线</h2>
                <div class="form-group">
                    <label for="start">起点</label>
                    <input type="text" id="start" placeholder="请输入起点">
                </div>
                <div class="form-group">
                    <label for="end">终点</label>
                    <input type="text" id="end" placeholder="请输入终点">
                </div>
                <div class="form-group">
                    <label for="strategy">规划策略</label>
                    <select id="strategy"
                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px;">
                        <option value="shortest">最短距离</option>
                        <option value="fastest">最快时间</option>
                        <option value="least_crowded">最少拥挤</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="planPath()">规划路线</button>
            </div>

            <!-- 路线结果 -->
            <div class="path-result" id="path-result" style="display: none;">
                <h2>路线结果</h2>
                <div id="path-details"></div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>关于我们</h3>
                    <p>个性化旅游系统致力于为用户提供便捷、智能的旅游服务，让每一次旅行都成为难忘的回忆。</p>
                </div>

                <div class="footer-section">
                    <h3>联系我们</h3>
                    <ul>
                        <li><i class="fas fa-envelope"></i> contact@travel-system.com</li>
                        <li><i class="fas fa-phone"></i> 123-456-7890</li>
                        <li><i class="fas fa-map-marker-alt"></i> 北京市海淀区</li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 个性化旅游系统. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <script>
        // 检查用户登录状态
        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/user/status');
                const data = await response.json();
                const userLinks = document.getElementById('user-links');

                if (data.logged_in) {
                    userLinks.innerHTML = `
                        <span style="margin-right: 15px; color: #3498db; font-weight: 500;">欢迎，${data.user_name}</span>
                        <a href="/logout"><i class="fas fa-sign-out-alt"></i> 退出</a>
                    `;
                } else {
                    userLinks.innerHTML = `
                        <a href="/login"><i class="fas fa-sign-in-alt"></i> 登录</a>
                        <a href="/register"><i class="fas fa-user-plus"></i> 注册</a>
                    `;
                }
            } catch (error) {
                console.error('检查登录状态失败:', error);
            }
        }

        // 页面加载时检查登录状态
        window.onload = checkLoginStatus;

        // 规划路线
        async function planPath() {
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            const strategy = document.getElementById('strategy').value;

            if (!start || !end) {
                alert('请输入起点和终点');
                return;
            }

            const resultDiv = document.getElementById('path-result');
            const detailsDiv = document.getElementById('path-details');

            detailsDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>规划中...</p></div>';
            resultDiv.style.display = 'block';

            try {
                const response = await fetch('/api/path/plan', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ start, end, strategy })
                });
                const data = await response.json();

                detailsDiv.innerHTML = `
                    <div style="margin-bottom: 20px;">
                        <h3>路线详情</h3>
                        <p><strong>起点:</strong> ${data.path[0]}</p>
                        <p><strong>终点:</strong> ${data.path[data.path.length - 1]}</p>
                        <p><strong>距离:</strong> ${data.distance} 米</p>
                        <p><strong>预计时间:</strong> ${data.time} 分钟</p>
                        <p><strong>交通方式:</strong> ${data.transport}</p>
                    </div>
                    <div>
                        <h4>路线:</h4>
                        <ol style="margin-left: 20px; margin-top: 10px;">
                            ${data.path.map((point, index) => `<li>${point}</li>`).join('')}
                        </ol>
                    </div>
                `;
            } catch (error) {
                console.error('规划路线失败:', error);
                detailsDiv.innerHTML = '<p style="color: #e74c3c;">规划失败，请重试</p>';
            }
        }
    </script>
</body>

</html>
